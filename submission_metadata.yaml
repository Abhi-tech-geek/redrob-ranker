# ============================================================================
# AI tools declaration  (honest; not penalised)
# ============================================================================
ai_tools_used:
  - "Claude"        # architecture, code review, scaffolding

ai_usage_summary: |
  Used Claude (Claude Code) to help design the scoring architecture, scaffold
  the Python modules, and review code. All design decisions (feature weights,
  honeypot heuristics, anti-keyword-stuffing logic) were reviewed and tuned by
  the team against the dataset. No candidate data was sent to any hosted LLM,
  and the ranking step itself makes zero network/LLM calls.

# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  JD-adaptive, fully interpretable CPU ranker. The JD is parsed into a target
  role-domain vector (over ~18 occupational domains), an experience band, target
  locations, salient keywords and any excluded specialties from a "do NOT want"
  section. Six weighted base components — role-domain fit (candidate-vs-JD
  domain cosine, the dominant anti-keyword-stuffer signal), TF-IDF semantic
  match on the candidate's prose (not the skills list), JD-keyword evidence,
  experience-band fit, product-vs-services history, and location — are combined
  and then modulated by multiplicative gates: behavioral availability (response
  rate, recency, notice), verified corroboration (assessment scores + GitHub),
  a keyword-stuffing penalty, an excluded-specialty penalty, a job-hopping
  penalty, and an internal-consistency / honeypot gate that pushes impossible
  profiles out of the top 100. Because nothing is hard-coded to one role, the
  same code ranks any JD. Runs the full 100K pool in ~2 minutes on CPU, no GPU,
  no network.

